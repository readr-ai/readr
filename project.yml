# XcodeGen spec — run `xcodegen generate` to produce Readr.xcodeproj.
# Requires macOS + Xcode 15+. The project is regenerated from this file, so the
# .xcodeproj is git-ignored (see .gitignore).
name: Readr

options:
  bundleIdPrefix: com.readrai
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  # `sources: - App` sweeps in App/PrivacyInfo.xcprivacy; make the privacy
  # manifest a bundled resource (not a compiled source) on every XcodeGen
  # version so the archive ships it (avoids the ITMS-91053 rejection).
  fileTypes:
    xcprivacy:
      buildPhase: resources

packages:
  # The core logic lives in the local Swift package at the repo root.
  ReadrKit:
    path: .
  # EPUB reading: ZIPFoundation supplies the archive bytes; all EPUB parsing
  # lives in ReadrKit.EPUBBookParser.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    exactVersion: "0.9.19"
  # Readium's paginated navigator (reflow/fonts/decorations) is an optional
  # rendering upgrade tracked for a later milestone:
  # ReadiumNavigator:
  #   url: https://github.com/readium/swift-toolkit
  #   from: "3.0.0"

targets:
  Readr:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - App
    dependencies:
      - package: ReadrKit
        product: ReadrKit
      - package: ZIPFoundation
        product: ZIPFoundation
    # Keys that GENERATE_INFOPLIST_FILE can't express land in this generated
    # plist (git-ignored; XcodeGen keeps it out of Copy Bundle Resources) and
    # Xcode merges both sources into the final Info.plist.
    info:
      path: App/Info.plist
      properties:
        # HTTPS-only networking qualifies for the exemption, so TestFlight
        # never asks the export-compliance question per build.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # All four orientations keep the iPad multitasking-capable
        # (UIRequiresFullScreen would opt out of Split View).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Files-app / Finder registration: Readr shows up in "Open with" and
        # share sheets for exactly the formats the in-app importer accepts —
        # keep this list in lockstep with LibraryImport.types
        # (App/Views/Library/LibrarySupport.swift). LSHandlerRank is Alternate
        # throughout: Readr reads these system/standard UTIs but owns none of
        # them.
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB Publication
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: PDF Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
          - CFBundleTypeName: Plain Text
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
          - CFBundleTypeName: Markdown Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
        # Open-in-place is safe: AppModel.importBook takes security-scoped
        # access and copies the file into the app's Books directory — the
        # original is never held open or mutated.
        LSSupportsOpeningDocumentsInPlace: true
        # Readr has its own library UI; it is not a document-browser app.
        UISupportsDocumentBrowser: false
    settings:
      base:
        # Must match the App ID registered in the Apple Developer portal.
        PRODUCT_BUNDLE_IDENTIFIER: com.readrai.app
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_CFBundleDisplayName: Readr
        # App Store / Launchpad category (an ebook reader → Books).
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.books
        TARGETED_DEVICE_FAMILY: "1,2"
        # Cloud-managed signing: the TestFlight workflow passes
        # DEVELOPMENT_TEAM + an App Store Connect API key on the command line
        # (see .github/workflows/testflight.yml). The team ID deliberately
        # never lives in the repo; simulator builds need none, and device
        # builds pick a team in Xcode's Signing pane or via
        # `DEVELOPMENT_TEAM=... xcodebuild ...`.
        CODE_SIGN_STYLE: Automatic
        # App icon + accent live in App/Assets.xcassets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ReadrAppUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    sources:
      - UITests
    dependencies:
      - target: Readr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readrai.uitests
        SWIFT_VERSION: "5.9"

  # macOS-only visual coverage: app-hosted unit tests that render the key
  # SwiftUI surfaces offscreen and attach PNGs (published to ci-screenshots
  # with m-prefixed names). Deterministic — no XCUITest automation session.
  ReadrSnapshotTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - SnapshotTests
    dependencies:
      - target: Readr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readrai.snapshottests
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Readr.app/Contents/MacOS/Readr"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Readr:
    build:
      targets:
        Readr: all
        ReadrAppUITests: [test]
    test:
      targets:
        - ReadrAppUITests

  # Separate scheme so the iOS simulator run never plans the macOS-only
  # snapshot bundle, and vice versa.
  ReadrSnapshots:
    build:
      targets:
        Readr: all
        ReadrSnapshotTests: [test]
    test:
      targets:
        - ReadrSnapshotTests
