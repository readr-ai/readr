# Deploys the launch landing site (site/) to GitHub Pages.
#
# NOTE: `enablement: true` below asks configure-pages to enable Pages
# automatically. If that step fails with a permissions error, the repo owner
# must enable Pages ONCE by hand: Settings → Pages → Source: "GitHub Actions",
# then re-run this workflow.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
