name: Release

# Build and publish a macOS app artifact. Two triggers:
#  - pushing a version tag (v1.0.0, ...)
#  - manual dispatch with a version input (the tag is then created by the
#    release action at the dispatched commit) — needed because some git
#    proxies can't push tags.
# The binary is unsigned pre-1.0; users right-click -> Open on first launch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-app:
    name: Build & publish Readr.app (macOS)
    runs-on: macos-15
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build Release app
        run: >
          set -o pipefail &&
          xcodebuild build
          -project Readr.xcodeproj
          -scheme Readr
          -configuration Release
          -destination 'generic/platform=macOS'
          -derivedDataPath build
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
      - name: Ad-hoc sign the app
        # No Developer ID in CI, so sign ad-hoc: Apple Silicon requires at
        # least an ad-hoc signature, and a consistent bundle-wide signature
        # avoids "damaged app" errors. Users still see the one-time Gatekeeper
        # prompt until the app is notarized with a real Developer ID.
        run: |
          cd build/Build/Products/Release
          codesign --force --deep --sign - Readr.app
          codesign --verify --deep --strict Readr.app
      - name: Zip the app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Readr.app "Readr-macOS-${VERSION}.zip"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: build/Build/Products/Release/Readr-macOS-*.zip
          generate_release_notes: true
          body: |
            ## Opening the app (unsigned build)

            Readr is ad-hoc signed but not yet notarized, so macOS shows a
            one-time Gatekeeper warning:

            - **macOS 15+**: open the app once (click **Done** on the warning),
              then **System Settings → Privacy & Security → Open Anyway**.
            - **macOS 13/14**: right-click `Readr.app` → **Open** → **Open**.
            - Terminal: `xattr -d com.apple.quarantine /Applications/Readr.app`
